name: Weekly Startup Intelligence Report

on:
  # Manual trigger only
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (only email ardal@militiainv.com)'
        required: false
        default: 'false'
        type: boolean

jobs:
  startup-classification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run startup classification (production)
        if: ${{ github.event.inputs.test_mode == 'false' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python competitive_threat_tracker.py \
            --csv-dir private_company_data \
            --portfolio-name "Militia" \
            --scope software \
            --min-employees 250 \
            --max-employees 10000 \
            --email

      - name: Run startup classification (test mode)
        if: ${{ github.event.inputs.test_mode == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python competitive_threat_tracker.py \
            --csv-dir private_company_data \
            --portfolio-name "Militia" \
            --scope software \
            --min-employees 250 \
            --max-employees 10000 \
            --email \
            --test
